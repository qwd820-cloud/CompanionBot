# CompanionBot DGX Spark 部署 — Docker Compose (NGC 方案)
# 适配 DGX Spark UMA (128GB 统一内存，CPU/GPU 共享)
#
# 全部基于 NGC PyTorch 镜像，无需从 Docker Hub 拉取第三方镜像
# LLM 引擎使用 Dockerfile.llm 在 NGC 基础上安装 SGLang

services:
  companion-bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: companion-bot
    ports:
      - "8765:8765"
    volumes:
      - companion-data:/app/server/data
      - ../config:/app/config:ro
    environment:
      - LOCAL_LLM_URL=http://host.docker.internal:8888/v1
      - CUDA_VISIBLE_DEVICES=0
      # UMA 内存管理: 限制感知层模型的 GPU 内存占用
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - TORCH_CUDA_ALLOC_FRACTION=0.15
    # --- DGX Spark UMA 关键配置 ---
    ipc: host
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - companion-net

  llm-engine:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.llm
    container_name: companion-llm
    command: >
      python -m server.llm_server
      --model Qwen/Qwen3.5-27B
      --port 8000
      --host 0.0.0.0
    ports:
      - "8000:8000"
    volumes:
      # 复用宿主机 HuggingFace 缓存（SGLang 通过 HF cache 结构加载模型）
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface:ro
    environment:
      - CUDA_VISIBLE_DEVICES=0
    # --- DGX Spark UMA 关键配置 ---
    ipc: host
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - companion-net

volumes:
  companion-data:

networks:
  companion-net:
    driver: bridge
