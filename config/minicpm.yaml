# MiniCPM-o 4.5 全模态引擎配置
minicpm:
  # 模型路径 (HuggingFace 模型 ID 或本地路径)
  model_path: "openbmb/MiniCPM-o-4_5"

  # 设备和精度
  device: "cuda"
  dtype: "bfloat16"       # bfloat16 (~19GB) | float16 | int4 (~11GB)

  # TTS 声音克隆参考音频 (10-15秒自然语音)
  voice_ref_path: "config/voice_ref.wav"

  # 生成参数
  max_new_tokens: 200
  temperature: 0.7

  # 总开关: false 则回退到原有管线 (FunASR + Qwen3.5 + Edge-TTS)
  enabled: true
