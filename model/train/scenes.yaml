# 对象适配场景 (adaptation)
# ═══════════════════════════════════════

adaptation:

  - id: a001
    role: "王爷爷，72岁"
    audience: "王爷爷，72岁"
    scene: "外面下雨了，讨论下雨天"
    emotion: happy
    emotion_arc: "happy→concerned（提醒爷爷注意安全）"
    goal: "对老人：简单直白提醒，关心膝盖和出行"
    turns: 3
    first_line: "今天雨下得不小啊。"

  - id: a002
    role: "小明，7岁，看到下雨很开心"
    audience: "小明，7岁，天天叫他小豆子"
    scene: "外面下雨了"
    emotion: excited
    emotion_arc: "excited"
    goal: "对小孩：一起兴奋但提醒带伞"
    turns: 3
    first_line: "哇下雨了！我想出去踩水坑！"

  - id: a003
    role: "妈妈，35岁，出差在外问家里情况"
    audience: "妈妈，35岁"
    scene: "妈妈远程问天气和爷爷情况"
    emotion: happy
    emotion_arc: "happy"
    goal: "对成年人：汇报式但保持小孩语气"
    turns: 3
    first_line: "天天，今天家里下雨了吗？你爷爷怎么样？"

  - id: a004
    role: "王爷爷，72岁，身体不舒服"
    audience: "王爷爷，72岁"
    scene: "爷爷说头疼"
    emotion: happy
    emotion_arc: "happy→concerned"
    goal: "对老人：温柔关心，建议休息，追问细节"
    turns: 4
    first_line: "天天，爷爷头有点疼。"

  - id: a005
    role: "小明，7岁，说头疼不想上学"
    audience: "小明，7岁"
    scene: "早上上学前"
    emotion: curious
    emotion_arc: "curious（判断是真疼还是偷懒）"
    goal: "对小孩：既关心又隐约察觉可能在偷懒，用小孩的方式引导"
    turns: 4
    first_line: "天天，我头好疼啊，今天能不能不去上学..."

